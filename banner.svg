<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="vdbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="50%" style="stop-color:#1A1F2E"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <linearGradient id="vdaccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8"/>
      <stop offset="50%" style="stop-color:#0096C7"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
    <linearGradient id="vdpurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7B2FF7"/>
      <stop offset="100%" style="stop-color:#5A1DAD"/>
    </linearGradient>
    <filter id="vdglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="300" fill="url(#vdbg)"/>

  <!-- Diagonal lines pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="300" y2="300" stroke="#00B4D8" stroke-width="1"/>
    <line x1="100" y1="0" x2="400" y2="300" stroke="#00B4D8" stroke-width="1"/>
    <line x1="200" y1="0" x2="500" y2="300" stroke="#00B4D8" stroke-width="1"/>
    <line x1="300" y1="0" x2="600" y2="300" stroke="#00B4D8" stroke-width="1"/>
    <line x1="400" y1="0" x2="700" y2="300" stroke="#00B4D8" stroke-width="1"/>
    <line x1="500" y1="0" x2="800" y2="300" stroke="#00B4D8" stroke-width="1"/>
    <line x1="600" y1="0" x2="900" y2="300" stroke="#00B4D8" stroke-width="1"/>
  </g>

  <!-- Play button icon -->
  <g transform="translate(450,65)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#vdaccent)" stroke-width="2" opacity="0.7"/>
    <polygon points="-8,-14 -8,14 14,0" fill="url(#vdaccent)" opacity="0.8"/>
  </g>

  <!-- 4K badge -->
  <rect x="365" y="98" width="60" height="30" rx="6" fill="url(#vdpurple)" opacity="0.9"/>
  <text x="395" y="119" font-family="'Segoe UI Black', 'Arial Black', sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="900">4K</text>

  <text x="450" y="120" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#888" text-anchor="middle" dx="40">UHD</text>

  <!-- Main title -->
  <text x="450" y="170" font-family="'Segoe UI', Arial, sans-serif" font-size="44" fill="white" text-anchor="middle" font-weight="800" letter-spacing="2">Video Downloader</text>

  <!-- Subtitle -->
  <text x="450" y="200" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#00B4D8" text-anchor="middle" letter-spacing="3">YOUTUBE � VIMEO � FACEBOOK � 100+ SITES</text>

  <!-- Resolution tags -->
  <rect x="200" y="220" width="65" height="24" rx="4" fill="transparent" stroke="#555" stroke-width="0.7"/>
  <text x="232" y="236" font-family="'Consolas', monospace" font-size="11" fill="#888" text-anchor="middle">1080p</text>

  <rect x="278" y="220" width="55" height="24" rx="4" fill="transparent" stroke="#555" stroke-width="0.7"/>
  <text x="305" y="236" font-family="'Consolas', monospace" font-size="11" fill="#888" text-anchor="middle">1440p</text>

  <rect x="346" y="220" width="55" height="24" rx="4" fill="transparent" stroke="#00B4D8" stroke-width="1"/>
  <text x="373" y="236" font-family="'Consolas', monospace" font-size="11" fill="#00B4D8" text-anchor="middle">2160p</text>

  <rect x="414" y="220" width="75" height="24" rx="4" fill="transparent" stroke="#7B2FF7" stroke-width="1"/>
  <text x="451" y="236" font-family="'Consolas', monospace" font-size="11" fill="#7B2FF7" text-anchor="middle">4320p 8K</text>

  <rect x="502" y="220" width="65" height="24" rx="4" fill="transparent" stroke="#555" stroke-width="0.7"/>
  <text x="534" y="236" font-family="'Consolas', monospace" font-size="11" fill="#888" text-anchor="middle">MP3</text>

  <rect x="580" y="220" width="65" height="24" rx="4" fill="transparent" stroke="#555" stroke-width="0.7"/>
  <text x="612" y="236" font-family="'Consolas', monospace" font-size="11" fill="#888" text-anchor="middle">FLAC</text>

  <rect x="658" y="220" width="55" height="24" rx="4" fill="transparent" stroke="#555" stroke-width="0.7"/>
  <text x="685" y="236" font-family="'Consolas', monospace" font-size="11" fill="#888" text-anchor="middle">SRT</text>

  <!-- Bottom info -->
  <text x="450" y="278" font-family="'Consolas', monospace" font-size="10" fill="#444" text-anchor="middle">v5.2.0 � Free � Open Source � Windows 10/11</text>

  <!-- Accent lines -->
  <rect x="0" y="0" width="900" height="2" fill="url(#vdaccent)" opacity="0.6"/>
  <rect x="0" y="298" width="900" height="2" fill="url(#vdpurple)" opacity="0.6"/>
</svg>